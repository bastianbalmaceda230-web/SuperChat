<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Superchat</title>
    <meta name="description" content="Chat en tiempo real con Firebase, salas, imágenes, audios y modo oscuro.">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Socket.IO client (opcional - si no está disponible, la app usa solo Firestore) -->
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="public/css/style.css">
</head>

<body style="visibility: hidden;">

    <!-- ── AUTH LOADER ──────────────────────────────── -->
    <!-- Cubre la pantalla mientras Firebase verifica la sesión -->
    <div id="auth-loader">
        <div class="auth-loader-spinner"></div>
        <span class="auth-loader-text">Verificando sesión…</span>
    </div>

    <!-- ── WELCOME OVERLAY ──────────────────────────── -->
    <div id="welcome-overlay" style="display:none">
        <div id="welcome-content">
            <div id="welcome-avatar"></div>
            <div id="welcome-greeting">Bienvenido</div>
            <div id="welcome-name"></div>
        </div>
    </div>

    <!-- ── HEADER ───────────────────────────────────── -->
    <header>
        <div class="header-left">
            <span class="header-dot"></span>
            <span class="header-title">Superchat</span>
            <span id="firebase-badge" class="fb-badge" title="Conectado a Firebase">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="#FFA000">
                    <path
                        d="M3.89 15.67L2 19l6.5-1.5L3.89 15.67zM22 6.5L14.5 2 8 10.5l6 3.5 8-7.5zM8 10.5L2 19l6.5-1.5L8 10.5zm6 3.5L8 10.5 2 19l12-5z" />
                </svg>
            </span>
        </div>
        <div class="header-right">
            <button id="friends-btn" class="icon-btn" title="Amigos" aria-label="Ver amigos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            </button>
            <button id="notif-btn" class="icon-btn" title="Notificaciones" aria-label="Ver notificaciones">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
                <span id="notif-badge" class="badge" style="display:none">0</span>
            </button>
            <button id="members-btn" class="icon-btn" title="Miembros" aria-label="Ver miembros">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="7" r="4" />
                    <path d="M2 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                </svg>
                <span id="members-count" class="badge">0</span>
            </button>
            <button id="theme-btn" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema">
                <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <button id="logout-btn" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>
    </header>

    <!-- ── SALAS ─────────────────────────────────────── -->
    <nav id="salas">
        <button class="sala-btn active" data-sala="general">General</button>
        <button class="sala-btn" data-sala="deportes">Deportes</button>
        <button class="sala-btn" data-sala="peliculas">Películas</button>
        <button class="sala-btn" data-sala="videojuegos">Videojuegos</button>
        <button id="nueva-sala-btn" title="Crear nueva sala" aria-label="Nueva sala">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
        </button>
    </nav>

    <!-- ── LAYOUT PRINCIPAL ──────────────────────────── -->
    <div id="main-layout">

        <div id="chat-panel">
            <div id="chat-container"></div>

            <!-- Preview imagen adjunta -->
            <div id="image-preview-container" style="display:none">
                <div id="image-preview-inner">
                    <img id="image-preview-img" src="" alt="preview">
                    <button id="image-preview-remove" aria-label="Quitar imagen">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Formulario -->
            <form id="form-container">
                <button type="button" id="emoji-btn" class="icon-btn" aria-label="Emojis">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 13s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>
                </button>
                <button type="button" id="attach-btn" class="icon-btn" aria-label="Adjuntar imagen">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </button>
                <input type="file" id="image-input" accept="image/*" style="display:none">
                <button type="button" id="audio-btn" class="icon-btn" aria-label="Enviar audio">
                    <svg id="icon-mic" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="2" width="6" height="12" rx="3" />
                        <path d="M5 10a7 7 0 0 0 14 0" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                        <line x1="9" y1="22" x2="15" y2="22" />
                    </svg>
                    <svg id="icon-stop" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                </button>
                <input type="text" id="message-input" placeholder="Escribe un mensaje…" autocomplete="off">
                <button type="submit" id="send-btn" aria-label="Enviar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </div>

        <!-- Panel de miembros -->
        <aside id="members-panel" class="side-panel">
            <div class="members-header panel-header">
                <span>Miembros</span>
                <button id="members-close" class="icon-btn" aria-label="Cerrar panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <ul id="members-list"></ul>
        </aside>

        <!-- Panel de notificaciones (solicitudes de amistad) -->
        <aside id="notif-panel" class="side-panel">
            <div class="panel-header">
                <span>Solicitudes</span>
                <button id="notif-close" class="icon-btn" aria-label="Cerrar panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <ul id="notif-list"></ul>
        </aside>

        <!-- Panel de amigos -->
        <aside id="friends-panel" class="side-panel">
            <div class="panel-header">
                <span>Amigos</span>
                <button id="friends-close" class="icon-btn" aria-label="Cerrar panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <ul id="friends-list"></ul>
        </aside>

        <!-- Panel de DM (chat privado) -->
        <aside id="dm-panel" class="side-panel dm-panel-wide">
            <div class="panel-header">
                <span id="dm-title">Chat privado</span>
                <button id="dm-close" class="icon-btn" aria-label="Cerrar DM">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div id="dm-chat-container"></div>
            <form id="dm-form-container">
                <input type="text" id="dm-message-input" placeholder="Mensaje privado…" autocomplete="off">
                <button type="submit" id="dm-send-btn" aria-label="Enviar DM">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </aside>

    </div>

    <!-- Indicador de grabación -->
    <div id="recording-indicator" style="display:none">
        <span class="rec-dot"></span>
        <span id="rec-timer">0:00</span>
        <button id="rec-cancel" aria-label="Cancelar grabación">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
    </div>

    <!-- ── LOGOUT OVERLAY ──────────────────────────── -->
    <div id="logout-overlay">
        <div id="logout-content">
            <div id="logout-avatar"></div>
            <div id="logout-text">Hasta pronto</div>
            <div id="logout-name"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <button id="lightbox-close" aria-label="Cerrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="imagen ampliada">
    </div>

    <script src="public/js/chat.js?v=4"></script>
    <script type="module">
        import { EmojiButton } from 'https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.4/dist/index.js';
        const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';
        const picker = new EmojiButton({ position: 'top-start', theme: isDark() ? 'dark' : 'light' });
        const trigger = document.getElementById('emoji-btn');
        const input = document.getElementById('message-input');
        picker.on('emoji', sel => {
            const s = input.selectionStart, e = input.selectionEnd;
            input.value = input.value.slice(0, s) + sel.emoji + input.value.slice(e);
            input.selectionStart = input.selectionEnd = s + sel.emoji.length;
            input.focus();
        });
        trigger.addEventListener('click', () => picker.togglePicker(trigger));
    </script>

    <!-- Firebase integration module -->
    <script type="module" src="public/js/firebase-chat.js?v=8"></script>

</body>

</html>
